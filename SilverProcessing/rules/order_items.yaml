table: order_items

rules:
  - type: not_null
    column: order_id

  - type: not_null
    column: order_item_id

  - type: not_null
    column: product_id

  - type: not_null
    column: price

  - type: range
    column: price
    min: 0

  - type: composite_unique
    columns:
      - order_id
      - order_item_id
